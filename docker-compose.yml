services:
  mongodb:
    image: mongo:latest
    container_name: mongodb_container
    ports:
      - "27017:27017"
    command: >
      bash -c "
      mongod --replSet rs0 --bind_ip_all & 
      sleep 10; 
      mongosh --eval 'rs.initiate({_id:\"rs0\", members:[{_id:0, host:\"localhost:27017\"}]})';
      mongosh --eval 'db.getSiblingDB(\"admin\").createUser({user:\"admin\", pwd:\"password\", roles:[{role:\"root\", db:\"admin\"}]})';
      wait"